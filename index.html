<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHA X | Quant Intelligence</title>
    <meta name="description" content="Advanced AI-powered short-term stock prediction for high-conviction trades.">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alpha-X">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css?v=21">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-black text-white font-inter overflow-x-hidden">

    <!-- 4-Second Animated Warning -->
    <div id="warning-screen"
        class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black p-8 text-center">
        <div class="warning-icon mb-6">
            <i data-lucide="alert-triangle" class="w-16 h-16 text-amber-500 animate-pulse"></i>
        </div>
        <h1 class="text-2xl font-orbitron font-bold text-amber-500 mb-4 tracking-tighter">HIGH-RISK ALERT</h1>
        <p class="text-gray-400 max-w-xs leading-relaxed">
            High-risk short-term trading. You may lose money. Proceed at your own discretion.
        </p>
        <div class="mt-8 w-48 h-1 bg-gray-800 rounded-full overflow-hidden">
            <div id="loading-bar" class="h-full bg-amber-500" style="width: 0%"></div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="hidden min-h-screen pb-20">
        <!-- Header -->
        <header
            class="p-6 flex items-center justify-between border-b border-white/10 sticky top-0 bg-black/80 backdrop-blur-md z-40">
            <div class="flex items-center gap-2">
                <div
                    class="w-8 h-8 bg-gradient-to-br from-emerald-400 to-blue-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="zap" class="w-5 h-5 text-black fill-black"></i>
                </div>
                <h2 class="text-xl font-orbitron font-bold tracking-widest italic">ALPHA-X</h2>
            </div>
            <div class="flex items-center gap-2">
                <button id="nuclear-refresh"
                    class="p-2 rounded-full bg-neon/10 border border-neon/20 hover:bg-neon/20 transition-colors">
                    <i data-lucide="zap" class="w-4 h-4 text-neon"></i>
                </button>
                <button id="refresh-btn" class="p-2 rounded-full hover:bg-white/5 transition-colors">
                    <i data-lucide="refresh-cw" class="w-5 h-5 text-gray-400"></i>
                </button>
            </div>
        </header>

        <!-- Global Market Pulse -->
        <section
            class="px-6 py-2 bg-zinc-900/50 border-b border-white/5 flex items-center gap-6 overflow-x-auto no-scrollbar">
            <div class="flex items-center gap-2 shrink-0">
                <span class="text-[10px] font-orbitron font-bold text-neon uppercase tracking-tighter shadow-sm">S&P
                    500</span>
                <span id="index-spy" class="text-xs font-bold text-emerald-400">5,088.80 (+1.2%)</span>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <span
                    class="text-[10px] font-orbitron font-bold text-neon uppercase tracking-tighter shadow-sm">DOW</span>
                <span id="index-dow" class="text-xs font-bold text-emerald-400">39,131.53 (+0.8%)</span>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <span
                    class="text-[10px] font-orbitron font-bold text-neon uppercase tracking-tighter shadow-sm">NASDAQ</span>
                <span id="index-ndx" class="text-xs font-bold text-emerald-400">16,041.62 (+1.5%)</span>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <span class="text-[10px] font-orbitron font-bold text-gray-500 uppercase tracking-tighter">VIX</span>
                <span id="index-vix" class="text-xs font-bold text-rose-400">14.22 (-2.1%)</span>
            </div>
        </section>

        <!-- Filters & Strategy -->
        <section class="p-4 space-y-4">
            <div class="flex items-center justify-between gap-4">
                <div class="flex-1">
                    <label class="text-[10px] uppercase tracking-widest text-neon font-bold mb-1 block shadow-sm">Sector
                        Filter</label>
                    <div class="relative">
                        <select id="market-filter"
                            class="w-full bg-zinc-900 border border-white/10 rounded-xl p-3 text-sm appearance-none focus:outline-none focus:border-emerald-500/50">
                            <option value="ALL">ALL SECTORS</option>
                            <option value="Oil & Gas">OIL & GAS</option>
                            <option value="Tech">TECH</option>
                            <option value="AI-related">AI-RELATED</option>
                            <option value="EV">EV</option>
                            <option value="Biotech">BIOTECH</option>
                            <option value="Financial">FINANCIAL</option>
                            <option value="High Volatility">HIGH VOLATILITY</option>
                            <option value="Small Cap">SMALL CAP MOMENTUM</option>
                        </select>
                        <i data-lucide="chevron-down"
                            class="absolute right-3 top-3 w-4 h-4 text-gray-500 pointer-events-none"></i>
                    </div>
                </div>
                <div class="w-32">
                    <label class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-1 block">Risk
                        Mode</label>
                    <div id="aggression-toggle" class="flex bg-zinc-900 rounded-xl p-1 border border-white/10">
                        <button data-mode="low"
                            class="mode-btn flex-1 py-2 rounded-lg text-xs font-bold transition-all">C</button>
                        <button data-mode="mid"
                            class="mode-btn flex-1 py-2 rounded-lg text-xs font-bold bg-white/10 text-white transition-all">B</button>
                        <button data-mode="high"
                            class="mode-btn flex-1 py-2 rounded-lg text-xs font-bold transition-all text-red-500">H</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Top 5 Feed -->
        <main id="stock-list" class="p-4 space-y-6">
            <!-- Cards will be injected here -->
        </main>

        <!-- Detail View Modal -->
        <div id="stock-detail-modal" class="fixed inset-0 z-50 hidden bg-black">
            <div class="absolute inset-0 bg-black backdrop-blur-2xl"></div>
            <div class="relative h-full flex flex-col bg-black">
                <!-- Modal Header -->
                <header class="p-6 flex items-center justify-between border-b border-white/10">
                    <button id="close-detail"
                        class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5">
                        <i data-lucide="arrow-left" class="w-6 h-6 text-white"></i>
                    </button>
                    <div class="flex flex-col items-center">
                        <span id="detail-ticker"
                            class="text-3xl font-orbitron font-extrabold text-neon drop-shadow-[0_0_8px_rgba(0,255,255,0.4)]"></span>
                        <div class="flex items-center gap-2 mt-1">
                            <span id="detail-live-price" class="text-xl font-orbitron font-bold text-white"></span>
                            <span id="detail-live-signal"
                                class="px-2 py-0.5 rounded text-[10px] font-extrabold uppercase tracking-tighter"></span>
                        </div>
                    </div>
                    <div class="w-10"></div> <!-- Spacer -->
                </header>

                <!-- Modal Content (Dynamic v21 Core) -->
                <div id="modal-core-v21" class="flex-1 overflow-y-auto p-3 pb-32">
                    <!-- Entire UI injected here via app.js to bypass any HTML caching -->
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->

        <nav
            class="fixed bottom-0 left-0 right-0 h-16 bg-black/90 backdrop-blur-xl border-t border-white/10 flex items-center justify-around z-40">
            <button class="flex flex-col items-center gap-1 text-emerald-400">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Terminal</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-gray-600">
                <i data-lucide="activity" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Activity</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-gray-600">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Portfolio</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-gray-600">
                <i data-lucide="settings" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Settings</span>
            </button>
        </nav>
    </div>

    <script>
        window.onerror = function (msg, url, line) {
            alert("Error: " + msg + "\nURL: " + url + "\nLine: " + line);
        };
    </script>
    <script src="app.js?v=21"></script>
</body>

</html>
