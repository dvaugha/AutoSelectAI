<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALPHA-X | Private Intelligence</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css?v=100">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <!-- Risk Disclaimer / Warning Screen -->
    <div id="warning-screen">
        <div class="warning-box">
            <h1 class="text-rose-500 font-bold text-xl mb-4 italic">PRIVATE ACCESS ONLY</h1>
            <p class="text-gray-400 text-sm leading-relaxed">
                This tool provides asymmetric algorithmic data for short-term speculation (3-5 days).
                <br><br>
                <span class="text-white font-bold">Risk Acknowledgment:</span> Market volatility can result in total
                capital loss. Use with caution.
            </p>
            <div class="flex justify-center">
                <div class="progress-container">
                    <div id="loading-bar"></div>
                </div>
            </div>
            <p class="text-[10px] text-zinc-600 mt-8 tracking-widest uppercase font-mono">Initializing Neural Feed...
            </p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="app-container" class="hidden min-h-screen">
        <header class="flex items-center justify-between">
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter italic">ALPHA<span
                        class="text-accent underline">X</span></h1>
                <p class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest mt-1">v3.0 Quantum Logic</p>
            </div>
            <button id="reset-app"
                class="p-2 rounded-full bg-white/5 border border-white/5 active:bg-white/10 transition-all">
                <i data-lucide="zap" class="w-4 h-4 text-accent"></i>
            </button>
        </header>

        <main class="p-4 space-y-6 pb-20">
            <!-- Market Status Bar -->
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-accent shadow-[0_0_10px_#00ffaa] animate-pulse"></div>
                    <span class="text-[10px] font-bold text-accent uppercase tracking-widest">Live Signals Active</span>
                </div>
                <span class="text-[10px] text-zinc-500 font-mono" id="current-time"></span>
            </div>

            <!-- Stock Feed -->
            <div id="stock-feed" class="space-y-4">
                <!-- Cards injected here -->
            </div>
        </main>
    </div>

    <!-- Detail View -->
    <div id="modal-overlay" class="modal-overlay"></div>
    <div id="modal-container" class="modal-container no-scrollbar">
        <!-- Content Injected via JS for Cache Neutrality -->
    </div>

    <script src="app.js?v=100"></script>
</body>

</html>
